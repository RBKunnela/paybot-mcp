# ── Open spec-level questions surfaced during planning ────────────────
# These do NOT block @dev start, but @pm should triage them before mid-implementation.
spec_questions_for_pm:
  - id: SQ-1
    question: |
      Build-time ALLOW_BYPASS injection mechanism is not spec'd. T9.1 proposes
      esbuild/tsc `define`. @pm: confirm this is acceptable or document an
      alternative (e.g., separate prod build script with a literal constant file).
    impact: "Affects T9.1 ALLOW_BYPASS=false invariant in prod bundle."
  - id: SQ-2
    question: |
      MCP host caller-identity contract (FR-14 HARDENED) is opaque — spec says
      'host MUST pass verifiable caller identity' without specifying the wire
      shape. Is this a contract paybot publishes, or a Claude-Desktop-specific
      adapter? Production hosts beyond Claude Desktop need a defined surface.
    impact: "Affects T8.2 + downstream FR-14 test coverage. Stub adapter ships for demo; production-grade requires this resolution."
  - id: SQ-3
    question: |
      Core-side audit_event_id in pay() response (cross-anchor seed for T7.2) —
      is this a paybot-core deliverable in the BP-3.1 sprint, or does it land
      separately in BP-3.3? Plan assumes graceful degrade ('PENDING') if absent.
    impact: "Affects T7.2 acceptance test and chain integrity story for bank."
  - id: SQ-4
    question: |
      Vitest coverage is currently global. T11.2 scopes lines ≥80% to
      `src/middleware/hitl/**` only. Confirm scoped threshold is acceptable
      (rest of repo unchanged) or require global threshold lift.
    impact: "Affects @qa veto criterion."

