ready_for_dev_rationale: |
  All FRs and NFRs map to at least one task. Critical-path well-defined.
  Risks identified with mitigations. Cross-repo dependencies enumerated with
  owners. Test paths concrete (matches spec §11 1:1). Coverage gate explicit.
  Open spec questions are non-blocking for @dev to start P1-P5; SQ-2 and SQ-3
