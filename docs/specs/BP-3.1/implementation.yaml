# ── Risk register (planning view) ──────────────────────────────────────
risk_assessment:
  - id: R0
    description: |
      Epic AC says 5h; honest re-estimate is 22h. If the 5h is hard-locked, scope
      must shrink: e.g., ship only stdio channel in v0.3 (defer webhook+http-poll
      to v0.3.1). All three channels in v0.3 was an explicit operator decision
      2026-05-20, so descope requires operator re-approval.
    likelihood: H
    impact: H
    mitigation_in_plan: "Surface this in completion summary; flag to @pm for epic-AC re-estimate. P11 + bank-verifier-kit are the most descope-able if needed."
  - id: R1
    description: "Hybrid state machine + durable fork doubles test surface (spec R1)"
    likelihood: M
    impact: H
    mitigation_in_plan: "P3 includes property-based state-machine test enumerating ALL transitions. P11 chaos tier covers durable-resume."
  - id: R2
    description: "Webhook channel requires HTTP sidecar — air-gapped pilot may refuse"
    likelihood: M
    impact: M
    mitigation_in_plan: "http-poll channel is the explicit air-gap fallback (P4, P5). Sidecar starts ONLY when channel needs it (T5.1)."
  - id: R3
    description: "MCP elicitation spec is draft — host support varies"
    likelihood: M
    impact: M
    mitigation_in_plan: "Stdio form-mode is lowest-common-denominator; Claude Desktop confirmed support. OQ-D7 tracked."
  - id: R4
    description: "Bank may demand single Merkle tree, not two chains (spec R4)"
    likelihood: M
    impact: M
    mitigation_in_plan: "P10-verifier-kit turns claim into falsifiable artifact. Merkle unification deferred to BP-3.x as documented fallback."
  - id: R5
    description: "No operator console UI — webhook demo needs Slack stub"
    likelihood: H
    impact: M
    mitigation_in_plan: "Slack-stub is 3rd-party config, not paybot deliverable. Must be booked with @ux-design-expert by 2026-05-27."
  - id: R6
    description: |
      FR-14 caller-identity model depends on MCP host extension that does not exist
      uniformly across hosts. Claude Desktop adapter is TBD.
    likelihood: M
    impact: H
    mitigation_in_plan: "T8.2 ships a documented stub adapter (env-var token) for demo; production deployments require real host integration. Flag to @devops for host-integration backlog."
  - id: R7
    description: "Build-time ALLOW_BYPASS injection (T9.1) may interact with tsc/esbuild config in unexpected ways"
    likelihood: L
    impact: H
    mitigation_in_plan: "T9.1 dev_notes calls out using a `define` constant; tests/security/hitl/bypass-refused-in-prod.test.ts verifies the prod-bundle invariant."

