name: FriendlyAI Review

# Public wrapper only. The private validation method stays behind the
# FRIENDLYAI_REVIEW_API_URL endpoint and returns the friendlyai/review verdict.

on:
  pull_request:
    # `labeled` lets the deliberate bypass label re-run the workflow.
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: friendlyai-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write
  checks: write

jobs:
  review:
    name: friendlyai-review verdict
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run FriendlyAI Review
        uses: RBKunnela/friendlyai-review-action@bac4f0dd0a07da2815332fd88df7e60bf838e937 # v1.0.3
        with:
          review-api-key: ${{ secrets.FRIENDLYAI_REVIEW_API_KEY }}
          review-api-url: ${{ secrets.FRIENDLYAI_REVIEW_API_URL }}
          github-token: ${{ github.token }}
          bypass-label: friendlyai-bypass-ack-by-maintainer
          # This repo IS story-driven (docs/stories/ + active epics), so it keeps
          # the full linked-story / acceptance-criteria rubric instead of the
          # default 'standard' code-review rubric. Required because the service
          # default is 'standard' — without this, a redeploy would silently
          # downgrade this repo. See friendlyai-review#1 / -action#2.
          methodology: story-driven
