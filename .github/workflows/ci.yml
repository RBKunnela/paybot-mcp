name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Full quality gate: lint + typecheck + test (vitest, zero skipped) + build.
  # Named "test" for predictable branch-protection required-check context.
  # NO paths: filter — a path-filtered required check hangs PRs.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      # Mechanical zero-skip / no-focus gate. Fails publish if any test file
      # contains .skip / .only / xit / xdescribe (env-gated *.skipIf allowed).
      - name: No skipped/focused tests
        run: npm run check:no-skip

      # server.json (MCP registry manifest) must match package.json version.
      - name: server.json version in sync
        run: npm run check:server-version

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Cross-version build + typecheck coverage (Node 18 and 20).
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  # Publish to npm on main push ONLY after test + build gates pass.
  # A red suite makes publish impossible.
  publish:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
