name: Sinkra Review

# Wires RBKunnela/sinkra-action — a 9-agent council that reviews every PR
# for architecture, code quality, data, ops, product, and quality concerns.
#
# Verdict is delivered as a GitHub check-run. The verbatim check context
# name (as it appears in `gh pr checks`) is:
#
#   Sinkra Review / sinkra-action verdict
#
# To make this a required status check on main, add that exact string to
# branch protection's required_status_checks.contexts AFTER this workflow
# has run at least once on a merged commit.
#
# This repo is PUBLIC and sinkra-action is PRIVATE. GitHub Actions cannot
# resolve a private action reference via `uses: owner/repo@sha` from a
# public repo (the default GITHUB_TOKEN lacks read scope on the private
# action's repo). The PAT-checkout pattern below works around this:
# we checkout the private action into a local path using a fine-grained
# PAT, then invoke it via `uses: ./local-path`.
#
# REQUIRED REPO SECRET: SINKRA_ACTION_PAT (fine-grained PAT, contents:read
# on RBKunnela/sinkra-action only). See PR description for setup steps.
#
# Governance: chore-style CI wiring; the full review chain (sm/po/dev/qa/devops)
# still applies. Only @devops merges. See
# `.claude/rules/automated-pr-merge-authority.md` (in AIOX-Enterprise).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: sinkra-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  sinkra-review:
    name: sinkra-action verdict
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout sinkra-action (private)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: RBKunnela/sinkra-action
          ref: af19709550dc6e9355f439a1900984e284bf3e89  # v0.1.3
          token: ${{ secrets.SINKRA_ACTION_PAT }}
          path: .sinkra-action
          persist-credentials: false

      - name: Run Sinkra Review (v0.1.3, SHA-pinned)
        # SHA pin per supply-chain hygiene. To upgrade, bump the ref above
        # and the comment to the corresponding tag at
        # https://github.com/RBKunnela/sinkra-action/tags
        uses: ./.sinkra-action
        with:
          zai-api-key: ${{ secrets.OPENAI_API_KEY }}
          zai-base-url: 'https://api.openai.com/v1'
          model: 'gpt-4o-mini'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Defaults: zai-base-url, model (glm-4.6), agents (all),
          # max-diff-tokens (15000). Override here only if a repo has special needs.
