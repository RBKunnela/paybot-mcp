# Dependabot — automated dependency PRs for paybot-mcp
#
# What:    Weekly version-update PRs for npm packages and GitHub Actions.
#          Security updates (CVE fixes) are auto-enabled separately via the
#          /repos/{owner}/{repo}/automated-security-fixes API and surface
#          regardless of the schedule below.
# Why:     Keep supply chain current; minimize lag between CVE disclosure and patch.
#          paybot-mcp is published to npm and depends on paybot-sdk (peerDep) —
#          downstream MCP-client surface area makes timely security patching
#          load-bearing.
# Gate:    PRs run through CI + the SINKRA chain. @qa flags risk, @devops merges.
#
# Ecosystem coverage:
#   - npm (package-lock.json at repo root) — only runtime ecosystem
#   - github-actions (workflows in .github/workflows/) — keeps action versions current
#   No Python / Go / Rust / Ruby lockfiles detected — single-ecosystem repo.
#
# Reference:
#   - https://docs.github.com/en/code-security/dependabot
#   - Precedent (public): paybot-sdk PR #11 (merged 2513676d, 2026-05-22)
#   - Precedent (private): paybot-core PR #3 (merged 6dc6f5aa, 2026-05-22)
version: 2
updates:
  # ---------- npm ecosystem ----------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # Groups: batch alert waves so a solo operator can absorb them.
    # Without grouping, a typical Monday wave is ~15-20 individual PRs per repo;
    # grouped it's 3-5. Production patch/minor split keeps risk-tiers separate.
    # Dev deps batched freely (no runtime exposure). Security updates split by
    # severity so a critical CVE never gets bundled with a minor upgrade.
    groups:
      npm-patch-prod:
        applies-to: version-updates
        update-types: ["patch"]
        dependency-type: "production"
      npm-minor-prod:
        applies-to: version-updates
        update-types: ["minor"]
        dependency-type: "production"
      npm-dev-deps:
        applies-to: version-updates
        dependency-type: "development"
      npm-security-patch:
        applies-to: security-updates
        update-types: ["patch"]
      npm-security-minor:
        applies-to: security-updates
        update-types: ["minor"]

    # ---- Pin-and-defer: cap ecosystem tooling majors (incident 2026-06-03) ----
    # ESLint 10 is flat-config-only and TS 6 + typescript-eslint 8 force a
    # repo-wide lint/type migration. Until that migration lands (tracked as a
    # backlog epic), the weekly dev-deps group dragged these majors in and broke
    # the build (lint / type-check exit 2). Cap MAJORS only here — minor/patch
    # (incl. security) still flow. Remove these entries when the flat-config/TS6
    # migration epic completes.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/eslint-plugin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/parser"
        update-types: ["version-update:semver-major"]

  # ---------- GitHub Actions ecosystem ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
